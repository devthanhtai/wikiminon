<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minionland - Minecraft Server</title>
    <link rel="stylesheet" href="home_style.css">
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="home_background.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <nav class="nav-bar">
        <div class="logo">
            <img src="https://path-to-minion-icon.png" class="minion-nav-icon" alt="minion"> 
            MINIONLAND
        </div>
        
        <div class="menu">
            <a href="#">Trang chủ</a>
            <a href="#">Wiki Server</a>
            <a href="#">Cửa hàng</a>
            <a href="https://discord.gg/g2Qk5r7SmT" target="_blank" class="discord-btn">Discord</a>
        </div>
    </nav>

    <main class="home-content">
        <img src="https://i.pinimg.com/originals/f3/0d/13/f30d13374805e24344070868f682013f.png" class="logo-large" alt="minion-hero">
        
        <h1 class="main-title">The place for <span class="highlight">Minionland</span></h1>
        <h1 class="main-title" style="margin-top:-15px;">community</h1>
        
        <p class="sub-text">Chào mừng bạn đến với cộng đồng Minionland. Tham gia ngay để trải nghiệm server Minecraft độc đáo nhất!</p>
        
        <div class="search-container">
            <input type="text" class="search-bar-input" placeholder="Tìm kiếm người chơi, tài liệu server...">
        </div>
    </main>

</body>
</html>
